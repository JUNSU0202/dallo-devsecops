# Dallo DevSecOps — 전체 서비스 Docker Compose
#
# 사용법:
#   cd docker && docker-compose up -d
#
# 서비스:
#   - dallo-api:      http://localhost:8000 (API + 대시보드)
#   - dallo-postgres:  PostgreSQL 16 (분석 결과 DB)
#   - dallo-sonarqube: http://localhost:9000 (SonarQube)

version: "3.8"

services:
  # ===================================
  # Dallo API + 대시보드
  # ===================================
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: dallo-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://dallo:dallo_password@postgres:5432/dallo_db
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DALLO_ENCRYPTION_KEY=${DALLO_ENCRYPTION_KEY:-}
      - DALLO_API_KEYS=${DALLO_API_KEYS:-}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SONAR_HOST_URL=http://sonarqube:9000
      - SONAR_TOKEN=${SONAR_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dallo-network
    restart: unless-stopped

  # ===================================
  # PostgreSQL (분석 결과 + SonarQube 공용)
  # ===================================
  postgres:
    image: postgres:16-alpine
    container_name: dallo-postgres
    environment:
      POSTGRES_USER: dallo
      POSTGRES_PASSWORD: dallo_password
      POSTGRES_DB: dallo_db
    ports:
      - "5432:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dallo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dallo -d dallo_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===================================
  # Redis (Celery 브로커 + 캐시)
  # ===================================
  redis:
    image: redis:7-alpine
    container_name: dallo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dallo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ===================================
  # Celery Worker (비동기 분석 작업)
  # ===================================
  celery-worker:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: dallo-celery-worker
    command: celery -A api.celery_app worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=postgresql://dallo:dallo_password@postgres:5432/dallo_db
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DALLO_ENCRYPTION_KEY=${DALLO_ENCRYPTION_KEY:-}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - dallo-network
    restart: unless-stopped

  # ===================================
  # SonarQube (정적 분석)
  # ===================================
  sonarqube:
    image: sonarqube:10-community
    container_name: dallo-sonarqube
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonarqube
      SONAR_JDBC_USERNAME: dallo
      SONAR_JDBC_PASSWORD: dallo_password
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      - dallo-network
    restart: unless-stopped

volumes:
  redis_data:
  postgresql_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:

networks:
  dallo-network:
    driver: bridge
